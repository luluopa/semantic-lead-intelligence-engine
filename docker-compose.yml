version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: leads_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: leads_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: leads_rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  ollama:
    image: ollama/ollama:latest
    container_name: leads_ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    # O script de entrypoint vai baixar o tinyllama automaticamente
    entrypoint: ["/bin/sh", "-c", "ollama serve & sleep 5 && ollama pull tinyllama && wait"]

  mock-api:
    build:
      context: ./mock-api
    container_name: leads_mock_api
    ports:
      - "4000:4000"

  api:
    build:
      context: .
    container_name: leads_api
    ports:
      - "3000:3000"
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      mock-api:
        condition: service_started
      ollama:
        condition: service_started

  dozzle:
    image: amir20/dozzle:latest
    container_name: leads_dozzle
    ports:
      - "8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro

volumes:
  postgres_data:
  ollama_data:
